name: Gerar Calendário

on:
  schedule:
    # Roda a cada 30 minutos das 06h às 22h (horário de Brasília = UTC-3)
    # 06h BRT = 09h UTC | 22h BRT = 01h UTC (próximo dia)
    - cron: '0,30 9-23 * * 1-5'   # Seg a Sex 06h-20h30 BRT
    - cron: '0,30 0-1 * * 2-6'    # Seg a Sex 21h-22h30 BRT
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerar calendário HTML
        run: python gerar_calendario.py

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
